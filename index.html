<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f11">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ariabo CFO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f11;--surface:#161a1e;--surface2:#1c2127;--border:#2a2f36;
  --text:#e8e8e8;--text2:#8a8f98;--accent:#c8f169;--accent2:#a5d43a;
  --gabo:#69b8f1;--ari:#f1a669;--ariabo:#c8f169;--red:#f16969;
  --font:'DM Sans',sans-serif;--mono:'Space Mono',monospace;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow-x:hidden}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
input,select,button{font-family:var(--font)}

/* Notification */
.notif{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--accent);color:#0d0f11;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;z-index:999;transition:transform .25s ease;pointer-events:none;white-space:nowrap}
.notif.show{transform:translateX(-50%) translateY(0)}

/* Login screen */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:40px 24px}
.login-logo-sub{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.login-logo-main{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.login-subtitle{font-size:14px;color:var(--text2);margin-bottom:40px}
.login-box{width:100%;max-width:340px;display:flex;flex-direction:column;gap:14px}
.login-input{width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none}
.login-input:focus{border-color:var(--accent)}
.login-input::placeholder{color:var(--text2)}
.login-btn{background:var(--accent);border:none;color:#0d0f11;padding:14px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:transform .1s}
.login-btn:active{transform:scale(.97)}
.login-toggle{background:none;border:none;color:var(--accent);cursor:pointer;font-size:13px;margin-top:8px;text-decoration:underline}
.login-error{color:var(--red);font-size:13px;text-align:center}
.login-loading{color:var(--text2);font-size:14px}

/* Header */
.header{padding:20px 20px 0;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.logo-sub{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.logo-main{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header-right{display:flex;align-items:center;gap:10px}
.btn-sm{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-family:var(--font)}
.btn-sm:active{background:var(--border)}
.user-badge{font-size:11px;color:var(--accent);font-weight:600;font-family:var(--mono)}
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;padding-bottom:16px}
.month-nav button{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px}
.month-label{font-weight:600;font-size:16px;min-width:160px;text-align:center}

/* Cards */
.card{background:var(--surface);border-radius:14px;padding:18px 20px;border:1px solid var(--border);margin-bottom:12px}
.card-sm{border-radius:12px;padding:14px 16px}
.card-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.card-value{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--accent)}
.card-row{display:flex;gap:16px;margin-top:12px}
.card-row-item label{font-size:11px;color:var(--text2)}
.card-row-item span{font-family:var(--mono);font-size:14px;font-weight:600;display:block;margin-top:2px}
.split-cards{display:flex;gap:10px;margin-bottom:12px}
.split-cards .card{flex:1}
.who-label{font-size:11px;font-weight:600;margin-bottom:4px}
.who-value{font-family:var(--mono);font-size:18px;font-weight:700}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.chip-select{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:var(--font);cursor:pointer}

/* Expense item */
.exp-item{background:var(--surface);border-radius:12px;padding:14px 16px;border:1px solid var(--border);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;animation:fadeUp .2s ease}
.exp-left{flex:1;min-width:0}
.exp-desc{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.exp-tag{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap}
.exp-tag.fijo{background:rgba(105,184,241,.15);color:var(--gabo)}
.exp-tag.variable{background:rgba(200,241,105,.15);color:var(--accent)}
.exp-meta{font-size:12px;color:var(--text2);margin-top:4px}
.exp-date{font-size:11px;color:var(--text2);margin-top:2px}
.exp-amount{font-family:var(--mono);font-size:16px;font-weight:700;white-space:nowrap}
.exp-actions{display:flex;flex-direction:column;gap:4px;margin-left:8px}
.exp-actions button{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 4px}
.btn-edit{color:var(--text2)}
.btn-del{color:var(--red)}

/* Category bar */
.cat-bar-track{height:4px;background:var(--surface2);border-radius:2px;margin-top:4px}
.cat-bar-fill{height:4px;border-radius:2px;background:var(--accent);transition:width .3s ease}
.cat-row{display:flex;justify-content:space-between;font-size:13px}
.cat-amount{font-family:var(--mono);font-weight:600}

/* Income */
.income-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.btn-add-sm{background:var(--surface2);border:1px solid var(--border);color:var(--accent);padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:var(--font)}
.income-form{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;padding:12px;background:var(--surface2);border-radius:10px}
.income-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.income-amount{font-family:var(--mono);font-size:14px;color:var(--accent);font-weight:600}

/* Form */
.form-page{padding:20px}
.form-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-fields{display:flex;flex-direction:column;gap:12px}
.form-row{display:flex;gap:10px}
.form-row>div{flex:1}
.form-label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.form-input:focus{border-color:var(--accent)}
.btn-accent{background:var(--accent);border:none;color:#0d0f11;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);width:100%;transition:transform .1s}
.btn-accent:active{transform:scale(.97)}
.btn-secondary{background:transparent;border:1px solid var(--border);color:var(--text2);padding:12px;border-radius:12px;font-size:14px;cursor:pointer;font-family:var(--font);width:100%}

/* Confirm dialog */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.dialog-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center}
.dialog-title{font-size:16px;font-weight:700;margin-bottom:8px}
.dialog-msg{font-size:14px;color:var(--text2);margin-bottom:20px}
.dialog-btns{display:flex;gap:10px}
.dialog-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)}
.dialog-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.dialog-confirm{background:var(--red);border:none;color:white}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:flex-end;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;font-family:var(--font);padding:4px 16px}
.nav-btn .icon{font-size:18px}
.nav-btn .label{font-size:10px}
.nav-btn.active{color:var(--accent)}
.nav-btn:not(.active){color:var(--text2)}
.fab{background:var(--accent);border:none;color:#0d0f11;width:52px;height:52px;border-radius:50%;cursor:pointer;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:-20px;box-shadow:0 4px 20px rgba(200,241,105,.3);transition:transform .1s}
.fab:active{transform:scale(.9)}

.empty{text-align:center;padding:40px 0;color:var(--text2);font-size:14px}
.content{max-width:480px;margin:0 auto;padding:16px 20px}
.hidden{display:none!important}

.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="notif" class="notif"></div>
<div id="dialog" class="dialog-overlay hidden"></div>

<!-- Login Screen -->
<div id="loginScreen" class="login-wrap">
  <div class="login-logo-sub">Ariabo</div>
  <div class="login-logo-main">CFO</div>
  <div class="login-subtitle">Finanzas compartidas</div>
  <div class="login-box">
    <input class="login-input" id="loginEmail" type="email" placeholder="Email" autocomplete="email">
    <input class="login-input" id="loginPass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="handleAuth()">Iniciar sesión</button>
    <button class="login-toggle" id="loginToggle" onclick="toggleAuthMode()">No tienes cuenta? Regístrate</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- App Screen -->
<div id="appScreen" class="hidden" style="max-width:480px;margin:0 auto">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-sub">Ariabo</div>
        <div class="logo-main">CFO</div>
      </div>
      <div class="header-right">
        <span class="user-badge" id="userBadge"></span>
        <button class="btn-sm" onclick="exportCSV()">CSV</button>
        <button class="btn-sm" onclick="handleLogout()">Salir</button>
      </div>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&lt;</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="changeMonth(1)">&gt;</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Bottom Nav -->
<div id="bottomNav" class="bottom-nav hidden">
  <button class="nav-btn active" id="navList" onclick="showView('list')">
    <span class="icon">☰</span><span class="label">Gastos</span>
  </button>
  <button class="fab" onclick="showView('add')">+</button>
  <button class="nav-btn" id="navIncome" onclick="showView('income')">
    <span class="icon">$</span><span class="label">Ingresos</span>
  </button>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import{getFirestore,collection,doc,setDoc,deleteDoc,onSnapshot,query,orderBy}from"https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyD-AvL9iINS1y0jfPlPvGONpSZCtrztvr4",
  authDomain:"ariabo-cfo.firebaseapp.com",
  projectId:"ariabo-cfo",
  storageBucket:"ariabo-cfo.firebasestorage.app",
  messagingSenderId:"1005627138974",
  appId:"1:1005627138974:web:eb3e09a500f9b7a2b5ec8f"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const FIXED_CAT=["Vivienda","Servicios","Seguros","Suscripciones","Ahorro/Inversión"];
const VAR_CAT=["Alimentación","Transporte","Salud","Cuidado personal","Entretenimiento","Compras","Varios"];
const WHO=["Gabo","Ari"];
const FOR_W=["Gabo","Ari","Ariabo"];
const PAY=["Efectivo","Crédito","Transferencia","Yappy"];

// Map emails to display names
const NAME_MAP={};

let state={
  month:new Date().getMonth(),
  year:new Date().getFullYear(),
  view:"list",
  editId:null,
  filterWho:"Todos",
  filterType:"Todos",
  showIncomeForm:false,
  user:null,
  expenses:[],
  income:[],
  authMode:"login",
  unsubExp:null,
  unsubInc:null,
  deleteTarget:null,
  deleteType:null,
};

function periodKey(){return `${state.year}-${String(state.month).padStart(2,"0")}`}
function expCollPath(){return `households/ariabo/expenses_${periodKey()}`}
function incCollPath(){return `households/ariabo/income_${periodKey()}`}

// --- Auth ---
window.handleAuth=async function(){
  const email=document.getElementById("loginEmail").value.trim();
  const pass=document.getElementById("loginPass").value;
  const errEl=document.getElementById("loginError");
  errEl.textContent="";
  if(!email||!pass){errEl.textContent="Completa email y contraseña";return}
  try{
    if(state.authMode==="login") await signInWithEmailAndPassword(auth,email,pass);
    else await createUserWithEmailAndPassword(auth,email,pass);
  }catch(e){
    const msgs={"auth/invalid-credential":"Email o contraseña incorrecta","auth/email-already-in-use":"Este email ya está registrado","auth/weak-password":"La contraseña debe tener al menos 6 caracteres","auth/invalid-email":"Email no válido","auth/too-many-requests":"Demasiados intentos. Espera un momento"};
    errEl.textContent=msgs[e.code]||e.message;
  }
};

window.toggleAuthMode=function(){
  state.authMode=state.authMode==="login"?"register":"login";
  document.getElementById("loginBtn").textContent=state.authMode==="login"?"Iniciar sesión":"Crear cuenta";
  document.getElementById("loginToggle").textContent=state.authMode==="login"?"No tienes cuenta? Regístrate":"Ya tienes cuenta? Inicia sesión";
  document.getElementById("loginError").textContent="";
};

window.handleLogout=async function(){
  if(state.unsubExp)state.unsubExp();
  if(state.unsubInc)state.unsubInc();
  await signOut(auth);
};

onAuthStateChanged(auth,user=>{
  state.user=user;
  if(user){
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");
    document.getElementById("bottomNav").classList.remove("hidden");
    const name=user.email.toLowerCase().includes("gabo")||user.email.toLowerCase().includes("gabriel")?"Gabo":"Ari";
    document.getElementById("userBadge").textContent=name;
    subscribeToData();
  }else{
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("appScreen").classList.add("hidden");
    document.getElementById("bottomNav").classList.add("hidden");
    state.expenses=[];state.income=[];
  }
});

// --- Firestore real-time ---
function subscribeToData(){
  if(state.unsubExp)state.unsubExp();
  if(state.unsubInc)state.unsubInc();

  const expRef=collection(db,expCollPath());
  state.unsubExp=onSnapshot(query(expRef,orderBy("date","desc")),snap=>{
    state.expenses=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.view==="list")renderApp();
  });

  const incRef=collection(db,incCollPath());
  state.unsubInc=onSnapshot(query(incRef,orderBy("date","desc")),snap=>{
    state.income=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.view==="income")renderApp();
  });

  renderApp();
}

async function addExpense(data){
  const id="exp_"+Date.now()+"_"+Math.random().toString(36).substr(2,5);
  await setDoc(doc(db,expCollPath(),id),{...data,id,createdBy:state.user.email,createdAt:Date.now()});
}

async function updateExpense(id,data){
  await setDoc(doc(db,expCollPath(),id),{...data,id,updatedBy:state.user.email,updatedAt:Date.now()},{merge:true});
}

async function removeExpense(id){
  await deleteDoc(doc(db,expCollPath(),id));
}

async function addIncome(data){
  const id="inc_"+Date.now()+"_"+Math.random().toString(36).substr(2,5);
  await setDoc(doc(db,incCollPath(),id),{...data,id,createdBy:state.user.email,createdAt:Date.now()});
}

async function removeIncome(id){
  await deleteDoc(doc(db,incCollPath(),id));
}

// --- UI ---
function notify(msg){
  const el=document.getElementById("notif");
  el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2200);
}

function fmt(n){return "$"+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}
function today(){
  const d=new Date();
  return `${state.year}-${String(state.month+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

window.changeMonth=function(d){
  if(d<0){if(state.month===0){state.month=11;state.year--}else state.month--}
  else{if(state.month===11){state.month=0;state.year++}else state.month++}
  state.showIncomeForm=false;
  subscribeToData();
};

window.showView=function(v){
  state.view=v;state.editId=null;state.showIncomeForm=false;renderApp();
};

function updateNav(){
  document.getElementById("navList").className="nav-btn"+(state.view==="list"?" active":"");
  document.getElementById("navIncome").className="nav-btn"+(state.view==="income"?" active":"");
}

function renderApp(){
  document.getElementById("monthLabel").textContent=MONTHS[state.month]+" "+state.year;
  updateNav();
  const c=document.getElementById("content");
  if(state.view==="list")renderList(c);
  else if(state.view==="add")renderForm(c);
  else if(state.view==="income")renderIncome(c);
}

function renderList(c){
  const exps=state.expenses;
  const total=exps.reduce((s,e)=>s+e.amount,0);
  const fijos=exps.filter(e=>e.type==="Fijo").reduce((s,e)=>s+e.amount,0);
  const vars=exps.filter(e=>e.type==="Variable").reduce((s,e)=>s+e.amount,0);
  const gaboT=exps.filter(e=>e.who==="Gabo").reduce((s,e)=>s+e.amount,0);
  const ariT=exps.filter(e=>e.who==="Ari").reduce((s,e)=>s+e.amount,0);
  const ariaboT=exps.filter(e=>e.forWhom==="Ariabo").reduce((s,e)=>s+e.amount,0);

  const filtered=exps.filter(e=>{
    if(state.filterWho!=="Todos"&&e.who!==state.filterWho)return false;
    if(state.filterType!=="Todos"&&e.type!==state.filterType)return false;
    return true;
  });

  const byCat={};
  exps.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+e.amount});
  const sortedCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);

  let h=`
  <div class="card">
    <div class="card-label"><span class="sync-dot"></span> Total gastos del mes</div>
    <div class="card-value">${fmt(total)}</div>
    <div class="card-row">
      <div class="card-row-item"><label>Fijos</label><span>${fmt(fijos)}</span></div>
      <div class="card-row-item"><label>Variables</label><span>${fmt(vars)}</span></div>
    </div>
  </div>
  <div class="split-cards">
    <div class="card card-sm"><div class="who-label" style="color:var(--gabo)">Gabo pago</div><div class="who-value">${fmt(gaboT)}</div></div>
    <div class="card card-sm"><div class="who-label" style="color:var(--ari)">Ari pago</div><div class="who-value">${fmt(ariT)}</div></div>
  </div>
  <div class="card card-sm" style="margin-bottom:16px">
    <div class="who-label" style="color:var(--ariabo)">Gastos compartidos (Ariabo)</div>
    <div class="who-value">${fmt(ariaboT)}</div>
  </div>
  <div class="filters">
    <select class="chip-select" onchange="window._filterWho(this.value)">
      <option ${state.filterWho==="Todos"?"selected":""} value="Todos">Todos</option>
      <option ${state.filterWho==="Gabo"?"selected":""} value="Gabo">Gabo</option>
      <option ${state.filterWho==="Ari"?"selected":""} value="Ari">Ari</option>
    </select>
    <select class="chip-select" onchange="window._filterType(this.value)">
      <option ${state.filterType==="Todos"?"selected":""} value="Todos">Todos</option>
      <option value="Fijo" ${state.filterType==="Fijo"?"selected":""}>Fijos</option>
      <option value="Variable" ${state.filterType==="Variable"?"selected":""}>Variables</option>
    </select>
  </div>`;

  if(filtered.length===0)h+=`<div class="empty">No hay gastos registrados este mes</div>`;
  else filtered.forEach(e=>{
    h+=`<div class="exp-item">
      <div class="exp-left">
        <div class="exp-desc">${esc(e.description)} <span class="exp-tag ${e.type.toLowerCase()}">${e.type}</span></div>
        <div class="exp-meta">${e.category} — ${e.who} → ${e.forWhom} — ${e.payment}</div>
        <div class="exp-date">${e.date}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="exp-amount">${fmt(e.amount)}</div>
        <div class="exp-actions">
          <button class="btn-edit" onclick="window._editExp('${e.id}')">edit</button>
          <button class="btn-del" onclick="window._confirmDel('${e.id}','exp')">×</button>
        </div>
      </div>
    </div>`;
  });

  if(sortedCats.length>0){
    h+=`<div class="card" style="margin-top:16px"><div class="card-label">Desglose por categoria</div>`;
    sortedCats.forEach(([cat,amt])=>{
      const pct=total>0?Math.min((amt/total)*100,100):0;
      h+=`<div style="margin-bottom:10px">
        <div class="cat-row"><span>${cat}</span><span class="cat-amount">${fmt(amt)}</span></div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    });
    h+=`</div>`;
  }
  c.innerHTML=h;
}

function renderForm(c){
  const isEdit=state.editId!==null;
  let e;
  if(isEdit){e=state.expenses.find(x=>x.id===state.editId);if(!e){showView("list");return}}
  else{e={date:today(),who:"Gabo",forWhom:"Ariabo",type:"Variable",category:"Alimentación",description:"",amount:"",payment:"Yappy"}}

  const cats=e.type==="Fijo"?FIXED_CAT:VAR_CAT;
  const catOpts=cats.map(x=>`<option value="${x}" ${e.category===x?"selected":""}>${x}</option>`).join("");
  const whoOpts=WHO.map(x=>`<option value="${x}" ${e.who===x?"selected":""}>${x}</option>`).join("");
  const forOpts=FOR_W.map(x=>`<option value="${x}" ${e.forWhom===x?"selected":""}>${x}</option>`).join("");
  const payOpts=PAY.map(x=>`<option value="${x}" ${e.payment===x?"selected":""}>${x}</option>`).join("");

  c.innerHTML=`<div class="form-page">
    <div class="form-title">${isEdit?"Editar gasto":"Nuevo gasto"}</div>
    <div class="form-fields">
      <div><label class="form-label">Fecha</label><input type="date" class="form-input" id="fDate" value="${e.date}"></div>
      <div class="form-row">
        <div><label class="form-label">Quien pago</label><select class="form-input" id="fWho">${whoOpts}</select></div>
        <div><label class="form-label">Para quien</label><select class="form-input" id="fFor">${forOpts}</select></div>
      </div>
      <div class="form-row">
        <div><label class="form-label">Tipo</label>
          <select class="form-input" id="fType" onchange="window._updateCats()">
            <option value="Fijo" ${e.type==="Fijo"?"selected":""}>Fijo</option>
            <option value="Variable" ${e.type==="Variable"?"selected":""}>Variable</option>
          </select>
        </div>
        <div><label class="form-label">Categoria</label><select class="form-input" id="fCat">${catOpts}</select></div>
      </div>
      <div><label class="form-label">Descripcion</label><input type="text" class="form-input" id="fDesc" placeholder="Ej: Netflix, Super El Rey..." value="${esc(e.description)}"></div>
      <div class="form-row">
        <div><label class="form-label">Monto (USD)</label><input type="number" class="form-input" id="fAmt" placeholder="0.00" step="0.01" value="${e.amount||""}"></div>
        <div><label class="form-label">Metodo de pago</label><select class="form-input" id="fPay">${payOpts}</select></div>
      </div>
      <button class="btn-accent" onclick="window._submitExp()">${isEdit?"Guardar cambios":"Registrar gasto"}</button>
      <button class="btn-secondary" onclick="showView('list')">Cancelar</button>
    </div>
  </div>`;
}

function renderIncome(c){
  const incs=state.income;
  const totalInc=incs.reduce((s,i)=>s+i.amount,0);
  let h=`<div class="card" style="margin-bottom:16px">
    <div class="card-label"><span class="sync-dot"></span> Ingresos variables del mes</div>
    <div class="card-value" style="font-size:22px">${fmt(totalInc)}</div>
  </div>
  <div class="card">
    <div class="income-header">
      <div class="card-label" style="margin:0">Registros</div>
      <button class="btn-add-sm" onclick="window._toggleIncForm()">+ Agregar</button>
    </div>`;

  if(state.showIncomeForm){
    h+=`<div class="income-form">
      <input type="date" class="form-input" id="iDate" value="${today()}">
      <select class="form-input" id="iWho"><option>Gabo</option><option>Ari</option></select>
      <input class="form-input" id="iSrc" placeholder="Fuente (ej: Comision, Intereses)">
      <input type="number" class="form-input" id="iAmt" placeholder="Monto" step="0.01">
      <button class="btn-accent" onclick="window._addIncome()">Registrar ingreso</button>
    </div>`;
  }

  if(incs.length===0&&!state.showIncomeForm){
    h+=`<div style="font-size:13px;color:var(--text2);padding:8px 0">Sin ingresos variables este mes</div>`;
  }
  incs.forEach(inc=>{
    h+=`<div class="income-item">
      <div><div style="font-size:13px;font-weight:500">${esc(inc.source)}</div>
        <div style="font-size:11px;color:var(--text2)">${inc.who} — ${inc.date}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="income-amount">+${fmt(inc.amount)}</div>
        <button class="btn-del" onclick="window._confirmDel('${inc.id}','inc')" style="background:none;border:none;cursor:pointer;font-size:14px">×</button>
      </div>
    </div>`;
  });
  h+=`</div>`;
  c.innerHTML=h;
}

// --- Confirm dialog ---
function showDialog(title,msg,onConfirm){
  const d=document.getElementById("dialog");
  d.classList.remove("hidden");
  d.innerHTML=`<div class="dialog-box">
    <div class="dialog-title">${title}</div>
    <div class="dialog-msg">${msg}</div>
    <div class="dialog-btns">
      <button class="dialog-cancel" onclick="window._closeDialog()">Cancelar</button>
      <button class="dialog-confirm" onclick="window._dialogConfirm()">Eliminar</button>
    </div>
  </div>`;
  window._dialogOnConfirm=onConfirm;
}
window._closeDialog=function(){document.getElementById("dialog").classList.add("hidden")};
window._dialogConfirm=function(){
  if(window._dialogOnConfirm)window._dialogOnConfirm();
  window._closeDialog();
};

// --- Global handlers ---
window._filterWho=function(v){state.filterWho=v;renderApp()};
window._filterType=function(v){state.filterType=v;renderApp()};

window._editExp=function(id){state.editId=id;state.view="add";renderApp()};

window._confirmDel=function(id,type){
  showDialog("Eliminar","Seguro que quieres eliminar este registro?",async()=>{
    if(type==="exp"){await removeExpense(id);notify("Gasto eliminado")}
    else{await removeIncome(id);notify("Ingreso eliminado")}
  });
};

window._updateCats=function(){
  const type=document.getElementById("fType").value;
  const cats=type==="Fijo"?FIXED_CAT:VAR_CAT;
  const sel=document.getElementById("fCat");
  sel.innerHTML=cats.map(x=>`<option value="${x}">${x}</option>`).join("");
};

window._submitExp=async function(){
  const desc=document.getElementById("fDesc").value.trim();
  const amt=parseFloat(document.getElementById("fAmt").value);
  if(!desc||!amt||amt<=0){notify("Completa descripción y monto");return}
  const entry={
    date:document.getElementById("fDate").value,
    who:document.getElementById("fWho").value,
    forWhom:document.getElementById("fFor").value,
    type:document.getElementById("fType").value,
    category:document.getElementById("fCat").value,
    description:desc,
    amount:amt,
    payment:document.getElementById("fPay").value,
  };
  if(state.editId){
    await updateExpense(state.editId,entry);
    notify("Gasto actualizado");
  }else{
    await addExpense(entry);
    notify("Gasto registrado");
  }
  showView("list");
};

window._toggleIncForm=function(){state.showIncomeForm=!state.showIncomeForm;renderApp()};

window._addIncome=async function(){
  const date=document.getElementById("iDate").value;
  const who=document.getElementById("iWho").value;
  const source=document.getElementById("iSrc").value.trim();
  const amount=parseFloat(document.getElementById("iAmt").value);
  if(!date||!source||!amount){notify("Completa todos los campos");return}
  await addIncome({date,who,source,amount});
  state.showIncomeForm=false;
  notify("Ingreso registrado");
  renderApp();
};

window.exportCSV=function(){
  const exps=state.expenses;
  if(exps.length===0){notify("No hay gastos para exportar");return}
  const header="Fecha,Quien Pago,Para Quien,Tipo,Categoria,Descripcion,Monto,Metodo de Pago\n";
  const rows=exps.map(e=>`${e.date},${e.who},${e.forWhom},${e.type},${e.category},"${e.description}",${e.amount},${e.payment}`).join("\n");

  const incs=state.income;
  let incSection="";
  if(incs.length>0){
    incSection="\n\nIngresos Variables\nFecha,Quien,Fuente,Monto\n";
    incSection+=incs.map(i=>`${i.date},${i.who},"${i.source}",${i.amount}`).join("\n");
  }

  const csv="\uFEFF"+header+rows+incSection;
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`Ariabo_${MONTHS[state.month]}_${state.year}.csv`;
  a.click();URL.revokeObjectURL(url);
  notify("CSV descargado");
};

// Register service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
